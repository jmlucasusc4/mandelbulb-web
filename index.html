<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mandelbulb Web | Joseph Lucas</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #ff3366;
            font-family: monospace;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <div id="ui">Mandelbulb Power 8.0 | Ray Marching</div>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const uniforms = {
            u_time: { value: 0.0 },
            u_power: { value: 8.0 },
            u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
        };

        const material = new THREE.ShaderMaterial({
            glslVersion: THREE.GLSL3,
            uniforms: uniforms,
            vertexShader: `
                out vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                precision highp float;
                uniform float u_time;
                uniform float u_power;
                uniform vec2 u_resolution;
                out vec4 fragColor;

                // Mandelbulb logic with trap-coloring for that vibrant look
                vec4 map(vec3 p) {
                    vec3 z = p;
                    float dr = 1.0;
                    float r = 0.0;
                    float power = u_power;
                    float trap = 1.0e10; // For coloring based on orbit distance

                    for (int i = 0; i < 15; i++) {
                        r = length(z);
                        if (r > 2.0) break;

                        // acos stability fix to prevent black spots
                        float theta = acos(clamp(z.z / r, -1.0, 1.0));
                        float phi = atan(z.y, z.x);

                        dr = pow(r, power - 1.0) * power * dr + 1.0;
                        float zr = pow(r, power);
                        theta *= power;
                        phi *= power;

                        z = zr * vec3(sin(theta) * cos(phi), sin(phi) * sin(theta), cos(theta)) + p;

                        // Orbit trap: track how close we get to the axis for coloring
                        trap = min(trap, dot(z, z));
                    }
                    return vec4(0.5 * log(max(r, 1.0001)) * r / dr, trap, r, 0.0);
                }

                // Normal estimation: Essential for 3D depth and highlights
                vec3 getNormal(vec3 p) {
                    float d = map(p).x;
                    vec2 e = vec2(0.0005, 0.0);
                    vec3 n = d - vec3(
                        map(p - e.xyy).x,
                        map(p - e.yxy).x,
                        map(p - e.yyx).x
                    );
                    return normalize(n);
                }

                void main() {
                    vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.y, u_resolution.x);

                    // Camera Rotation
                    float radius = 3.0;
                    float speed = u_time * 0.2;
                    vec3 ro = vec3(radius * sin(speed), 1.0 * cos(speed * 0.5), radius * cos(speed));

                    vec3 target = vec3(0.0);
                    vec3 ww = normalize(target - ro);
                    vec3 uu = normalize(cross(ww, vec3(0.0, 1.0, 0.0)));
                    vec3 vv = normalize(cross(uu, ww));
                    vec3 rd = normalize(uv.x * uu + uv.y * vv + 1.5 * ww);

                    float t = 0.0;
                    vec4 res;
                    bool hit = false;
                    for(int i = 0; i < 150; i++) {
                        vec3 p = ro + rd * t;
                        res = map(p);
                        if(res.x < 0.0002) {
                            hit = true;
                            break;
                        }
                        t += res.x;
                        if(t > 8.0) break;
                    }

                    vec3 col = vec3(0.0);

                    if(hit) {
                        vec3 p = ro + rd * t;
                        vec3 n = getNormal(p);
                        vec3 lightDir = normalize(vec3(5.0, 8.0, 2.0));

                        // Lighting
                        float diff = max(dot(n, lightDir), 0.0);
                        float rim = pow(1.0 + dot(n, rd), 4.0);

                        // Color palette matching the reference (vibrant pink/purple)
                        vec3 baseColor = vec3(0.8, 0.1, 0.4);
                        vec3 accentColor = vec3(1.0, 0.5, 0.8);

                        // Use orbit trap to mix colors
                        col = mix(baseColor, accentColor, clamp(res.y * 0.5, 0.0, 1.0));
                        col *= (diff + 0.15); // Add ambient light
                        col += rim * 0.4; // Add rim highlights for extra detail

                        // Atmospheric depth
                        col *= exp(-0.2 * t);
                    }

                    fragColor = vec4(pow(col, vec3(0.4545)), 1.0); // Gamma correction
                }
            `
        });

        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
        scene.add(mesh);

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
        });

        function animate(t) {
            uniforms.u_time.value = t * 0.001;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate(0);
    </script>
</body>
</html>
