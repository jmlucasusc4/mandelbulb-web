<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mandelbulb Web | Joseph Lucas</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: monospace;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <div id="ui">drag rotate | scroll zoom<br>evolving power</div>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- Setup ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const uniforms = {
            u_time: { value: 0.0 },
            u_power: { value: 2.0 },
            u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
        };

        const material = new THREE.ShaderMaterial({
            glslVersion: THREE.GLSL3,
            uniforms: uniforms,
            vertexShader: `
                out vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                precision highp float;
                uniform float u_time;
                uniform float u_power;
                uniform vec2 u_resolution;
                out vec4 fragColor;

                // Mandelbulb Distance Estimator
                float map(vec3 p) {
                    vec3 z = p;
                    float dr = 1.0;
                    float r = 0.0;
                    float power = u_power;

                    for (int i = 0; i < 12; i++) {
                        r = length(z);
                        if (r > 2.0) break;

                        // acos stability fix
                        float theta = acos(clamp(z.z / r, -1.0, 1.0));
                        float phi = atan(z.y, z.x);

                        dr = pow(r, power - 1.0) * power * dr + 1.0;

                        float zr = pow(r, power);
                        theta *= power;
                        phi *= power;

                        z = zr * vec3(sin(theta) * cos(phi), sin(phi) * sin(theta), cos(theta)) + p;
                    }
                    return 0.5 * log(max(r, 1.0001)) * r / dr;
                }

                // Normal Estimation
                vec3 getNormal(vec3 p) {
                    float d = map(p);
                    vec2 e = vec2(0.001, 0.0);
                    vec3 n = d - vec3(
                        map(p - e.xyy),
                        map(p - e.yxy),
                        map(p - e.yyx)
                    );
                    return normalize(n);
                }

                void main() {
                    vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.y, u_resolution.x);

                    // Camera Rotation Logic
                    float radius = 3.5;
                    float speed = u_time * 0.3;
                    vec3 ro = vec3(radius * sin(speed), 1.0 * cos(speed * 0.5), radius * cos(speed));

                    vec3 target = vec3(0.0);
                    vec3 ww = normalize(target - ro);
                    vec3 uu = normalize(cross(ww, vec3(0.0, 1.0, 0.0)));
                    vec3 vv = normalize(cross(uu, ww));
                    vec3 rd = normalize(uv.x * uu + uv.y * vv + 1.5 * ww);

                    float t = 0.0;
                    bool hit = false;
                    for(int i = 0; i < 90; i++) {
                        vec3 p = ro + rd * t;
                        float d = map(p);
                        if(d < 0.001) {
                            hit = true;
                            break;
                        }
                        t += d;
                        if(t > 10.0) break;
                    }

                    vec3 col = vec3(0.01, 0.01, 0.02); // Dark space background

                    if(hit) {
                        vec3 p = ro + rd * t;
                        vec3 normal = getNormal(p);
                        vec3 lightDir = normalize(vec3(5.0, 5.0, -2.0));

                        // Lighting Model
                        float diff = max(dot(normal, lightDir), 0.0);
                        float rim = pow(1.0 + dot(normal, rd), 3.0);

                        vec3 baseColor = vec3(0.1, 0.45, 0.85);
                        col = mix(baseColor * diff, vec3(0.6, 0.9, 1.0), rim * 0.3);
                        col *= exp(-0.1 * t); // Distance shading
                    }

                    fragColor = vec4(col, 1.0);
                }
            `
        });

        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
        scene.add(mesh);

        // Resize Handler
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate(t) {
            uniforms.u_time.value = t * 0.001;
            // Power oscillates between 2 (Sphere) and 8 (Mandelbulb)
            uniforms.u_power.value = 5.0 + 3.0 * Math.sin(t * 0.0004);

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate(0);
    </script>
</body>
</html>
